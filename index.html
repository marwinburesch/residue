<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harlow &amp; Sable — Expense Records</title>
    <link rel="stylesheet" href="/src/ui/styles.css" />
  </head>
  <body>
    <header id="topbar">
      <div class="topbar-brand">
        <span class="brand">Harlow &amp; Sable</span>
        <span class="subtitle">Expense Records / Field Extraction</span>
      </div>
      <button
        id="overflow-btn"
        class="overflow-btn"
        type="button"
        aria-label="Menu"
        aria-expanded="false"
      >
        ⋯
      </button>
    </header>
    <section id="log-panel" aria-label="System log"></section>
    <nav id="panel-nav" role="tablist" aria-label="Panels"></nav>
    <div id="resource-bar"></div>
    <main id="panels">
      <section data-panel="records" class="panel panel-records">
        <div id="records-toolbar" class="records-toolbar"></div>
        <div id="fragments"></div>
      </section>
      <section data-panel="ops" class="panel panel-ops">
        <div class="panel-body">
          <div id="channels"></div>
          <div id="upgrades"></div>
        </div>
      </section>
      <section data-panel="registry" class="panel panel-registry">
        <div class="panel-body">
          <div id="registry"></div>
        </div>
      </section>
    </main>
    <div id="drawer-scrim" hidden></div>
    <div id="overflow-menu" hidden></div>
    <div id="stage-transition-host"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
